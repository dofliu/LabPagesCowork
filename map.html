                // Personal Tools

                { id: "graphic", name: "AI Graphic Studio", nameZh: "AI視覺設計工作站", category: "personal", completion: 75, desc: "AI visual workstation for creating infographics, presentations, comics, and custom graphics using Gemini with multiple style presets.", tech: "React 19, TypeScript, Vite 7, Express, Gemini API, GCP Cloud Run", status: "active", papers: false, metrics: "6 tab pages, 5 generation modes, real-time cost calculation", milestone: "Template marketplace", outputs: ["tool"], lastUpdated: "" },
                { id: "tutor", name: "English Speaking Tutor", nameZh: "英語口說家教", category: "personal", completion: 60, desc: "English language learning platform with interactive speaking practice and tutoring capabilities.", tech: "React, TypeScript, Speech API", status: "active", papers: false, metrics: "Interactive speaking practice", milestone: "Pronunciation scoring AI", outputs: ["tool"], lastUpdated: "" },
                { id: "expense", name: "expense-auto", nameZh: "自動記帳工具", category: "personal", completion: 50, desc: "Automated expense tracking and management system with agent-based receipt processing.", tech: "Python, Agent Framework", status: "active", papers: false, metrics: "Agent-driven automation", milestone: "Receipt OCR integration", outputs: ["tool"], lastUpdated: "" }
            ]
        };

        // Color mapping
        const categoryColors = {};
        data.categories.forEach(cat => categoryColors[cat.id] = cat.color);

        // Calculate statistics
        function updateStats() {
            const totalProjects = data.projects.length;
            const activeProjects = data.projects.filter(p => p.status === "active").length;
            const productionProjects = data.projects.filter(p => p.status === "production").length;
            const paperProjects = data.projects.filter(p => p.papers).length;

            document.getElementById("statTotal").textContent = totalProjects;
            document.getElementById("statActive").textContent = activeProjects;
            document.getElementById("statProduction").textContent = productionProjects;
            document.getElementById("statPapers").textContent = paperProjects;
        }

        // Build legend
        function buildLegend() {
            const legend = d3.select("#legend");
            legend.html("");
            legend.append("div").attr("class", "legend-title").text("📊 分類 / Categories");

            data.categories.forEach(cat => {
                const count = data.projects.filter(p => p.category === cat.id).length;
                const item = legend.append("div").attr("class", "legend-item");
                item.append("div")
                    .attr("class", "legend-color-box")
                    .style("background", cat.color);
                item.append("span")
                    .attr("class", "legend-text")
                    .text(`${cat.icon} ${cat.name}`);
                item.append("span")
                    .attr("class", "legend-count")
                    .text(`${count}`);
                item.on("click", function() {
                    filterByCategory(cat.id);
                });
            });
        }

        // Filter by category
        let activeCategory = null;
        function filterByCategory(categoryId) {
            activeCategory = activeCategory === categoryId ? null : categoryId;

            d3.selectAll(".node-project")
                .style("opacity", d => activeCategory === null || d.category === activeCategory ? 1 : 0.15);
            d3.selectAll(".link-project")
                .style("opacity", d => activeCategory === null || d.target.category === activeCategory ? 0.5 : 0.1);
            d3.selectAll(".legend-item")
                .style("background", d => d3.select(this).select(".legend-color-box").style("background"))
                .style("opacity", d => activeCategory === null ? 1 : 0.5);

            d3.selectAll(".legend-color-box")
                .style("box-shadow", function() {
                    const parent = d3.select(this.parentNode);
                    const color = d3.select(this).style("background");
                    return activeCategory === null || parent.data()[0].id === activeCategory 
                        ? `0 0 8px ${color}` : "none";
                });
        }

        // Search functionality (initialized after D3 elements are created)
        let searchTerm = "";

        // Initialize D3 visualization
        const width = document.getElementById("visualization").parentElement.clientWidth;
        const height = document.getElementById("visualization").parentElement.clientHeight;

        const svg = d3.select("#visualization")
            .attr("width", width)
            .attr("height", height);

        // Create tooltip
        const tooltip = d3.select("#tooltip");

        // Build nodes and links
        const nodes = [
            data.center,
            ...data.categories,
            ...data.projects
        ];

        const links = [
            // Center to categories
            ...data.categories.map(cat => ({ source: "center", target: cat.id, type: "category" })),
            // Categories to projects
            ...data.projects.map(proj => ({ source: proj.category, target: proj.id, type: "project" }))
        ];

        // Create simulation
        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links)
                .id(d => d.id)
                .distance(d => d.type === "category" ? 200 : 150)
                .strength(d => d.type === "category" ? 0.7 : 0.3))
            .force("charge", d3.forceManyBody().strength(-400).distanceMax(500))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collide", d3.forceCollide().radius(d => {
                if (d.type === "center") return 45;
                if (d.type === "category") return 40;
                return 25 + (d.completion || 0) / 10;
            }))
            .on("tick", ticked);

        // Draw links
        const link = svg.selectAll(".link")
            .data(links)
            .enter()
            .append("line")
            .attr("class", d => `link link-${d.type}`)
            .attr("stroke", d => {
                if (d.type === "category") return "rgba(255, 255, 255, 0.15)";
                return "rgba(255, 255, 255, 0.05)";
            })
            .attr("stroke-width", d => d.type === "category" ? 2 : 1)
            .style("opacity", 0.5);

        // Draw nodes
        const node = svg.selectAll(".node")
            .data(nodes)
            .enter()
            .append("g")
            .attr("class", d => `node node-${d.type || 'project'}`)
            .call(d3.drag()
                .on("start", dragStarted)
                .on("drag", dragged)
                .on("end", dragEnded));

        // Center node
        node.filter(d => d.type === "center")
            .append("circle")
            .attr("r", 45)
            .style("fill", "#f1c40f")
            .style("filter", "drop-shadow(0 0 15px rgba(241, 196, 15, 0.6))");

        node.filter(d => d.type === "center")
            .append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "0.35em")
            .style("font-size", "11px")
            .style("font-weight", "700")
            .style("fill", "#1a2f4a")
            .style("pointer-events", "none")
            .text(d => "研究室");

        // Category nodes
        node.filter(d => d.type === "category")
            .append("circle")
            .attr("r", 40)
            .style("fill", d => categoryColors[d.id])
            .style("filter", d => `drop-shadow(0 0 10px ${categoryColors[d.id]})`);

        node.filter(d => d.type === "category")
            .append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "-0.5em")
            .style("font-size", "9px")
            .style("font-weight", "700")
            .style("fill", "white")
            .style("pointer-events", "none")
            .text(d => d.name.split(" ")[0]);

        // Project nodes
        node.filter(d => d.type === undefined)
            .append("defs")
            .append("linearGradient")
            .attr("id", d => `grad-${d.id}`)
            .attr("x1", "0%")
            .attr("x2", "100%")
            .selectAll("stop")
            .data(d => [
                { offset: "0%", color: categoryColors[d.category] },
                { offset: "100%", color: categoryColors[d.category] }
            ])
            .enter()
            .append("stop")
            .attr("offset", d => d.offset)
            .attr("stop-color", d => d.color);

        node.filter(d => d.type === undefined)
            .append("circle")
            .attr("r", d => 15 + (d.completion || 0) / 8)
            .style("fill", d => categoryColors[d.category])
            .style("opacity", 0.8);

        // Progress ring for projects
        node.filter(d => d.type === undefined)
            .append("circle")
            .attr("r", d => 15 + (d.completion || 0) / 8)
            .style("fill", "none")
            .style("stroke", d => categoryColors[d.category])
            .style("stroke-width", 2)
            .style("stroke-dasharray", d => {
                const r = 15 + (d.completion || 0) / 8;
                const circumference = 2 * Math.PI * r;
                return `${(d.completion / 100) * circumference} ${circumference}`;
            })
            .style("opacity", 0.6);

        // Project text labels
        node.filter(d => d.type === undefined)
            .append("text")
            .attr("text-anchor", "middle")
            .attr("dy", "0.35em")
            .style("font-size", "9px")
            .style("font-weight", "600")
            .style("fill", "white")
            .style("pointer-events", "none")
            .style("text-shadow", "0 1px 3px rgba(0, 0, 0, 0.8)")
            .text(d => d.name.substring(0, 8));

        // Detail panel logic
        const detailPanel = document.getElementById("detailPanel");
        const outputIcons = { paper: "📄 論文", platform: "🌐 平台", tool: "🔧 工具", course: "📚 課程", app: "📱 App", competition: "🏆 競賽", presentation: "📊 簡報" };
        const statusLabels = { active: "⚡ 開發中", production: "🚀 已上線", completed: "✅ 已完成", planning: "📋 規劃中", paused: "⏸️ 暫停" };
        const statusColors = { active: "#3498db", production: "#2ecc71", completed: "#27ae60", planning: "#f39c12", paused: "#7f8c8d" };

        function openDetailPanel(d) {
            const catObj = data.categories.find(c => c.id === d.category);
            document.getElementById("detailName").textContent = d.name;
            document.getElementById("detailNameZh").textContent = d.nameZh || "";
            const badge = document.getElementById("detailCategory");
            badge.textContent = catObj ? `${catObj.icon} ${catObj.name}` : d.category;
            badge.style.background = categoryColors[d.category];

            const fill = document.getElementById("detailProgressFill");
            fill.style.width = d.completion + "%";
            fill.style.background = `linear-gradient(90deg, ${categoryColors[d.category]}, ${categoryColors[d.category]}cc)`;
            document.getElementById("detailProgressText").textContent = `${d.completion}%`;

            const statusEl = document.getElementById("detailStatus");
            statusEl.textContent = statusLabels[d.status] || d.status;
            statusEl.style.color = statusColors[d.status] || "#95a5a6";

            document.getElementById("detailDesc").textContent = d.desc;

            const techContainer = document.getElementById("detailTech");
            techContainer.innerHTML = "";
            (d.tech || "").split(", ").forEach(t => {
                if (t.trim()) {
                    const tag = document.createElement("span");
                    tag.className = "detail-tech-tag";
                    tag.textContent = t.trim();
                    techContainer.appendChild(tag);
                }
            });

            const metricsSection = document.getElementById("detailMetricsSection");
            if (d.metrics) {
                metricsSection.style.display = "block";
                document.getElementById("detailMetrics").textContent = d.metrics;
            } else {
                metricsSection.style.display = "none";
            }

            const milestoneSection = document.getElementById("detailMilestoneSection");
            if (d.milestone && d.milestone !== "N/A" && d.milestone !== "N/A — Complete" && d.milestone !== "N/A — Competition submitted") {
                milestoneSection.style.display = "block";
                document.getElementById("detailMilestone").textContent = d.milestone;
            } else {
                milestoneSection.style.display = "none";
            }

            const outputsSection = document.getElementById("detailOutputsSection");
            const outputsContainer = document.getElementById("detailOutputs");
            if (d.outputs && d.outputs.length) {
                outputsSection.style.display = "block";
                outputsContainer.innerHTML = "";
                d.outputs.forEach(o => {
                    const item = document.createElement("span");
                    item.className = "detail-output-item";
                    item.textContent = outputIcons[o] || o;
                    outputsContainer.appendChild(item);
                });
            } else {
                outputsSection.style.display = "none";
            }

            document.getElementById("detailDate").textContent = d.lastUpdated || "未記錄";
            detailPanel.classList.add("open");
        }

        function closeDetailPanel() {
            detailPanel.classList.remove("open");
        }

        document.getElementById("detailClose").addEventListener("click", function(e) {
            e.stopPropagation();
            closeDetailPanel();
        });

        // Hover and click interactions
        node.on("mouseenter", function(event, d) {
            if (d.type === undefined) {
                const html = `
                    <div class="tooltip-name">${d.name}</div>
                    <div class="tooltip-desc">${d.desc}</div>
                    <div class="tooltip-meta">
                        <span class="tooltip-progress">完成度: ${d.completion}%</span>
                        <span>${d.status === "production" ? "📦 Production" : "⚙️ Active"}</span>
                    </div>
                    <div style="margin-top: 6px; font-size: 10px; color: #bdc3c7;">
                        <strong>Tech:</strong> ${d.tech}
                    </div>
                `;
                tooltip.html(html)
                    .classed("visible", true)
                    .style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY + 10) + "px");
            }
            d3.select(this).select("circle:first-of-type").style("filter", d => {
                if (d.type === "center") return "drop-shadow(0 0 20px rgba(241, 196, 15, 0.8))";
                return `drop-shadow(0 0 15px ${categoryColors[d.category] || categoryColors[d.id]})`;
            });
        })
        .on("mousemove", function(event) {
            tooltip.style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY + 10) + "px");
        })
        .on("mouseleave", function() {
            tooltip.classed("visible", false);
            d3.select(this).select("circle:first-of-type").style("filter", d => {
                if (d.type === "center") return "drop-shadow(0 0 15px rgba(241, 196, 15, 0.6))";
                if (d.type === "category") return `drop-shadow(0 0 10px ${categoryColors[d.id]})`;
                return "none";
            });
        })
        .on("click", function(event, d) {
            event.stopPropagation();
            if (d.type === undefined) {
                openDetailPanel(d);
            } else if (d.type === "category") {
                filterByCategory(d.id);
            }
        });

        // Drag functions
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Tick function
        function ticked() {
            link.attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node.attr("transform", d => `translate(${d.x}, ${d.y})`);
        }

        // Search functionality
        document.getElementById("searchInput").addEventListener("input", function(e) {
            searchTerm = e.target.value.toLowerCase();
            if (searchTerm === "") {
                d3.selectAll(".node").style("opacity", 1);
                link.style("opacity", 0.5);
            } else {
                d3.selectAll(".node-project").each(function(d) {
                    const match = d.name.toLowerCase().includes(searchTerm) ||
                                  (d.desc && d.desc.toLowerCase().includes(searchTerm)) ||
                                  (d.tech && d.tech.toLowerCase().includes(searchTerm));
                    d3.select(this).style("opacity", match ? 1 : 0.08);
                });
                d3.selectAll(".node-center, .node-category").style("opacity", 0.3);
                link.style("opacity", 0.1);
            }
        });

        // Reset on background click
        svg.on("click", function() {
            activeCategory = null;
            d3.selectAll(".node-project").style("opacity", 1);
            d3.selectAll(".link-project").style("opacity", 0.5);
            d3.selectAll(".legend-item").style("opacity", 1);
            d3.selectAll(".legend-color-box").style("box-shadow", "none");
            searchTerm = "";
            document.getElementById("searchInput").value = "";
            closeDetailPanel();
        });

        // Window resize handler
        window.addEventListener("resize", function() {
            const newWidth = document.getElementById("visualization").parentElement.clientWidth;
            const newHeight = document.getElementById("visualization").parentElement.clientHeight;
            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
        });

        // Initialize
        updateStats();
        buildLegend();
    </script>
</body>
</html>
