    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --text: #ecf0f1;
            --bg: #1a1a1a;
            --surface: #2d2d2d;
            --border: #404040;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1em;
            color: #bdc3c7;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--surface) 0%, var(--secondary) 100%);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.2);
        }

        .stat-card h3 {
            color: #bdc3c7;
            font-size: 0.9em;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .chart-container {
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .chart-container h3 {
            margin-bottom: 20px;
            font-size: 1.3em;
            color: var(--text);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        /* Timeline */
        .timeline-container {
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .timeline-container h3 {
            margin-bottom: 20px;
            font-size: 1.3em;
            color: var(--text);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, #3498db, #2ecc71, #e74c3c);
        }

        .timeline-item {
            margin-bottom: 20px;
            position: relative;
            padding-left: 30px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -15px;
            top: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3498db;
            border: 2px solid var(--bg);
        }

        .timeline-item.completed::before {
            background: #27ae60;
        }

        .timeline-item.planning::before {
            background: #f39c12;
        }

        .timeline-item .date {
            font-size: 0.85em;
            color: #95a5a6;
            font-weight: 500;
        }

        .timeline-item .event {
            color: var(--text);
            font-size: 0.95em;
            margin-top: 3px;
        }

        /* Table */
        .table-container {
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .table-header h3 {
            font-size: 1.3em;
            color: var(--text);
        }

        .search-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-filter input {
            padding: 10px 15px;
            background: var(--primary);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            font-size: 0.9em;
            min-width: 200px;
        }

        .search-filter input::placeholder {
            color: #7f8c8d;
        }

        .category-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--primary);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85em;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        thead {
            background: var(--primary);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
            cursor: pointer;
            color: var(--accent);
        }

        th:hover {
            background: var(--secondary);
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            transition: background 0.3s ease;
        }

        tbody tr:hover {
            background: var(--primary);
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status.active {
            background: rgba(39, 174, 96, 0.2);
            color: #27ae60;
        }

        .status.developing {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
        }

        .status.completed {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .status.planning {
            background: rgba(243, 156, 18, 0.2);
            color: #f39c12;
        }

        .status.paused {
            background: rgba(127, 140, 141, 0.2);
            color: #95a5a6;
        }

        .percentage {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .percentage-bar {
            width: 100px;
            height: 6px;
            background: var(--primary);
            border-radius: 3px;
            overflow: hidden;
        }

        .percentage-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            border-top: 2px solid var(--border);
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .charts-row {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }
        }

        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .table-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .search-filter {
                width: 100%;
            }

            .search-filter input {
                min-width: 100%;
            }

            table {
                font-size: 0.8em;
            }

            th, td {
                padding: 8px 10px;
            }
        }

        /* Radar Chart Custom */
        canvas {
            max-height: 350px;
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }
        /* Detail Panel */
        .detail-overlay {

            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);

        .detail-panel.open { right: 0; }
        .detail-panel .close-btn {

        .detail-panel h2 { font-size: 1.4rem; margin-bottom: 0.3rem; color: #ecf0f1; padding-right: 2rem; }

        .detail-panel .detail-outputs { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        .detail-panel .detail-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

        #projectsBody tr { cursor: pointer; }

        // Initialize Projects Table
        function initProjectsTable() {
            const tbody = document.getElementById('projectsBody');
            tbody.innerHTML = projectsData.map((project, idx) => `
                <tr onclick="openDetail(projectsData[${idx}])" title="點擊查看詳情">
                    <td><strong>${project._enriched && project._enriched.name_zh ? project._enriched.name_zh + '<br><small style=\"color:#7f8c8d\">' + project.name + '</small>' : project.name}</strong></td>
                    <td>${project.category}</td>
                    <td>
                        <div class="percentage">
                            <div class="percentage-bar">
                                <div class="percentage-fill" style="width: ${project.completion}%"></div>
                            </div>
                            <span>${project.completion}%</span>
                        </div>
                    </td>
                    <td>
                        <span class="status ${project.status === '已上線' ? 'active' : project.status === '已完成' ? 'completed' : project.status === '開發中' ? 'developing' : 'planning'}">
                            ${project.status}
                        </span>
                    </td>
                    <td><small>${project.tech}</small></td>
                    <td><small>${project.output}</small></td>
                    <td><small>${project.updated}</small></td>
                </tr>
            `).join('');
        }

        // Search and Filter
        function setupSearchFilter() {
            const searchInput = document.getElementById('searchInput');
            const filterBtns = document.querySelectorAll('.filter-btn');
            let currentFilter = 'all';

            searchInput.addEventListener('input', filterTable);

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.category;
                    filterTable();
                });
            });

            function filterTable() {
                const searchTerm = searchInput.value.toLowerCase();
                const rows = document.querySelectorAll('#projectsBody tr');

                rows.forEach(row => {
                    const name = row.cells[0].textContent.toLowerCase();
                    const category = row.cells[1].textContent;
                    const matchesSearch = name.includes(searchTerm);
                    const matchesCategory = currentFilter === 'all' || category.includes(currentFilter);

                    row.style.display = matchesSearch && matchesCategory ? '' : 'none';
                });
            }
        }

        // Sort Table
        function sortTable(columnIndex) {
            const tbody = document.getElementById('projectsBody');
            const rows = Array.from(tbody.querySelectorAll('tr'));

            rows.sort((a, b) => {
                const aValue = a.cells[columnIndex].textContent.trim();
                const bValue = b.cells[columnIndex].textContent.trim();

                // Try numeric sort for completion column
                if (columnIndex === 2) {
                    return parseFloat(bValue) - parseFloat(aValue);
                }

                return aValue.localeCompare(bValue, 'zh-TW');
            });

            tbody.innerHTML = '';
            rows.forEach(row => tbody.appendChild(row));
        }

        // Merge data.json into hardcoded data (adds last_updated, description, metrics, milestone)
        let enrichedData = {};
        async function loadDynamicData() {
            try {
                const res = await fetch('data.json');
                if (!res.ok) return;
                const data = await res.json();
                (data.projects || []).forEach(p => {
                    // Match by name (case-insensitive, partial match)
                    const key = (p.name || '').toLowerCase().replace(/[\s_-]/g, '');
                    enrichedData[key] = p;
                });
                // Update projectsData with real last_updated
                projectsData.forEach(p => {
                    const key = p.name.toLowerCase().replace(/[\s_-]/g, '');
                    const match = enrichedData[key] || Object.values(enrichedData).find(e =>
                        e.name.toLowerCase().replace(/[\s_-]/g, '') === key ||
                        (e.name_zh || '').includes(p.name) ||
                        p.name.toLowerCase().includes(e.name.toLowerCase().replace(/[\s_-]/g, ''))
                    );
                    if (match) {
                        if (match.last_updated && match.last_updated !== '') p.updated = match.last_updated;
                        p._enriched = match;
                    }
                });
                // Re-render table with updated data
                initProjectsTable();
            } catch(e) { /* data.json not available, use hardcoded */ }
        }

        // Detail Panel
        function openDetail(project) {
            const panel = document.getElementById('detailPanel');
            const overlay = document.getElementById('detailOverlay');
            const e = project._enriched || {};

            document.getElementById('detailName').textContent = (e.name_zh ? e.name_zh + ' (' + project.name + ')' : project.name);
            document.getElementById('detailCategory').textContent = project.category + ' | ' + project.status;

            const pct = project.completion;
            const color = pct >= 90 ? '#2ecc71' : pct >= 70 ? '#3498db' : pct >= 50 ? '#f1c40f' : '#e74c3c';
            document.getElementById('detailProgressBar').style.width = pct + '%';
            document.getElementById('detailProgressBar').style.background = color;
            document.getElementById('detailProgressText').textContent = pct + '% 完成';

            // Description
            const desc = e.description_zh || e.description || project.tech;
            document.getElementById('detailDescription').textContent = desc;

            // Status & Updated
            document.getElementById('detailStatus').textContent = project.status;
            document.getElementById('detailUpdated').textContent = project.updated !== '—' ? project.updated : '未記錄';

            // Tech tags
            const techArr = project.tech.split(',').map(t => t.trim()).filter(Boolean);
            document.getElementById('detailTech').innerHTML = techArr.map(t => '<span class="detail-tag">' + t + '</span>').join('');

            // Outputs
            const outputArr = project.output.split(',').map(t => t.trim()).filter(Boolean);
            document.getElementById('detailOutputs').innerHTML = outputArr.map(t => '<span class="detail-output">' + t + '</span>').join('');

            // Milestone
            const ms = document.getElementById('detailMilestoneSection');
            if (e.next_milestone) { ms.style.display = ''; document.getElementById('detailMilestone').textContent = e.next_milestone; }
            else { ms.style.display = 'none'; }

            // Metrics
            const mt = document.getElementById('detailMetricsSection');
            if (e.key_metrics) { mt.style.display = ''; document.getElementById('detailMetrics').textContent = e.key_metrics; }
            else { mt.style.display = 'none'; }

            panel.classList.add('open');
            overlay.classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            document.getElementById('detailOverlay').classList.remove('open');
        }

        // Keyboard: ESC to close
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', async () => {
            initCharts();
            initTimeline();
            initProjectsTable();
            setupSearchFilter();
            await loadDynamicData();
        });
