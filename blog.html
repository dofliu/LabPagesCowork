<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NCUT IAE Lab - Research Blog">
  <title>研究日誌 | DOF Lab</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .page-header {
      padding: 8rem 0 4rem;
      background: linear-gradient(to bottom, var(--bg-dark), #1e293b);
      text-align: center;
    }
    .page-header h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: var(--text-white);
    }
    .page-header p { color: var(--text-gray); }
    .blog-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
      margin-top: 2rem;
      align-items: start;
    }
    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.6rem;
      margin-bottom: 1.4rem;
    }
    .article-meta {
      color: var(--text-gray);
      display: flex;
      gap: 1rem;
      font-size: 0.95rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }
    .meta-date { color: var(--accent-color); font-weight: 600; }
    .meta-category {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      padding: 0.1rem 0.7rem;
    }
    .article-title { margin: 0 0 0.8rem; font-size: 1.5rem; line-height: 1.4; }
    .article-title a { color: var(--text-white); text-decoration: none; }
    .article-title a:hover { color: var(--primary-color); }
    .article-excerpt { color: var(--text-light); line-height: 1.7; margin: 0 0 1rem; }
    .read-more {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .sidebar-widget {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
    }
    .widget-title {
      color: var(--text-white);
      font-size: 1.1rem;
      margin: 0 0 0.8rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.6rem;
    }
    .stats-list, .topic-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .stats-list li, .topic-list li {
      color: var(--text-gray);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.4rem 0;
    }
    .topic-list .count {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      min-width: 1.9rem;
      text-align: center;
      font-size: 0.85rem;
      padding: 0.1rem 0.5rem;
    }
    .empty-state {
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.4);
      border-radius: 10px;
      padding: 1rem;
      background: rgba(127, 29, 29, 0.25);
    }
    @media (max-width: 900px) {
      .blog-grid { grid-template-columns: 1fr; }
      .page-header h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">DOF Lab<span class="dot">.</span></a>
      <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                              <ul class="nav-links">
                <li><a href="index.html">首頁</a></li>
                <li><a href="blog.html">研究日誌</a></li>
                <li><a href="publications.html">著作發表</a></li>
                <li><a href="lab.html">成員介紹</a></li>
                <li><a href="about.html">關於</a></li>
                <li><a href="contact.html">聯絡</a></li>
                <li><a href="dashboard.html">儀表板</a></li>
                <li><a href="privacy.html">隱私權</a></li>
            </ul>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>研究日誌</h1>
      <p>自動整理 posts/post 文章，顯示連結與分類統計。</p>
    </div>
  </header>

  <main class="container">
    <div class="blog-grid">
      <section id="post-list"></section>
      <aside>
        <section class="sidebar-widget">
          <h2 class="widget-title">文章統計</h2>
          <ul class="stats-list" id="global-stats"></ul>
        </section>
        <section class="sidebar-widget">
          <h2 class="widget-title">分類統計</h2>
          <ul class="topic-list" id="topic-list"></ul>
        </section>
      </aside>
    </div>
  </main>

  <script>
    const KNOWN_POST_FILES = [
      '發文流程指南.md',
      '2026-04-18-foundation-models-digital-twin-wind-fault-diagnosis.html',
      '2026-04-17-rag-ultimate-reproducibility-mulberry32-benchmark.html',
      '2026-04-16-windailab-external-api-realdata-integration.html',
      '2026-04-15-agentic-ai-university-education-edtech-2026.html',
      '2026-04-14-windailab-four-skills-yaw-curtailment-alarm-iec.html',
      '2026-04-13-windailab-phase11-multi-agent-paper-sprint.html',
      '2026-04-12-rag-ultimate-wind-energy-benchmark-agentic-rag.html',
      '2026-04-11-induspect-multimodal-ai-flutter-industrial-inspection.html',
      '2026-04-10-ecn-offshore-wind-cost-monte-carlo.html',
      '2026-04-10-agentic-ai-mcp-enterprise-wind-energy.html',
      '2026-03-31-research-stock.md',
      '2026-03-17-論文投稿準備與工作追蹤系統建立.md',
      '2026-03-12-gemini-embedding-2.md',
      '2026-03-12-gemini-embedding-2.html',
      '2026-03-10-induspect-spatial-awareness.md',
      '2026-03-10-induspect-spatial-awareness.html',
      '2026-03-09-sakura-soul-sync.md',
      '2026-03-09-sakura-soul-sync.html',
      '2026-03-09-ai-news-mcp-agentic.md',
      '2026-03-09-ai-news-mcp-agentic.html',
      '2026-03-08-mcp-ecosystem-explosion-linux-foundation.html',
      '2026-03-07-wind-turbine-fault-detection-causal-spatiotemporal.html',
      '2026-03-06-mcp-ecosystem-growth-enterprise-applications.html',
      '2026-03-04-mcp-2-6-1-enterprise-ai-agents.html',
      '2026-03-03-nullclaw-lightweight-ai-agent-framework.html',
      '2026-03-03-agenticocr-visual-rag.html',
      '2026-03-02-mcp-2-6-1-enterprise-ai-agents.html',
      '2026-03-01-hubscan-rag-security.html',
      '2026-02-28-search-p1-agentic-rag-training.html',
      '2026-02-28-scite-mcp-scientific-literature.html',
      '2026-02-27-mcp-explosive-growth.html',
      '2026-02-27-help-graphrag-efficiency.html',
      '2026-02-26.html',
      '2026-02-26-hybridrag-for-industrial-maintenance.html',
      '2026-02-25-continual-learning-ai-2026.html',
      '2026-02-25-claw-comparison.html',
      '2026-02-25-claude-code-remote-control.html',
      '2026-02-24-claude-opus-4-6-adaptive-thinking.html',
      '2026-02-23-samsung-galaxy-ai-multi-agent.html',
      '2026-02-22-ai-race-gemini-gpt.html',
      '2026-02-21-webmcp-ai-agents.html',
      '2026-02-21-gemini-3-1-pro.html',
      '2026-02-20-webmcp-ai-agents.html',
      '2026-02-20-sarvam-ai-india-llm.html',
      '2026-02-19-sarvam-ai-india-llm.html',
      '2026-02-19-deepmind-aletheia.html',
      '2026-02-18-nvidia-enterprise-rag-blueprint.html',
      '2026-02-18-deepmind-aletheia.html',
      '2026-02-17-neuromorphic-computers.html',
      '2026-02-17-bharatgen-multilingual-ai.html',
      '2026-02-16-openclaw-skills.md',
      '2026-02-16-ai-agent-skills.html',
      '2026-02-15-ai-self-talk.html',
      '2026-02-14-watchdog-fix.html',
      '2026-02-14-rag-model-comparison.html',
      '2026-02-14-openscholar.html',
      '2026-02-14-fine-tuning-rag.html',
      '2026-02-13-why-rag-for-wind.html',
    ];

    const postListEl = document.getElementById('post-list');
    const globalStatsEl = document.getElementById('global-stats');
    const topicListEl = document.getElementById('topic-list');

    const formatDate = (dateText) => {
      if (!dateText) return '未知日期';
      const d = new Date(dateText);
      if (Number.isNaN(d.getTime())) return dateText;
      return d.toISOString().slice(0, 10);
    };

    const normalizeCategory = (raw = '') => {
      const value = raw.trim();
      if (!value) return '未分類';
      return value.split('/')[0].trim() || '未分類';
    };

    const parseMarkdownPost = (text, url, filename) => {
      const title = (text.match(/^#\s+(.+)$/m) || [])[1] || filename;
      const date = (text.match(/\*\*日期\*\*:\s*([0-9]{4}-[0-9]{2}-[0-9]{2})/) || [])[1] || '';
      const excerpt = text
        .replace(/^#.+$/m, '')
        .replace(/\*\*日期\*\*:.+$/m, '')
        .replace(/[#>*`\-]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 120);
      return {
        title,
        date,
        category: '研究筆記',
        excerpt: excerpt ? `${excerpt}…` : '點擊查看完整內容。',
        url
      };
    };

    const parseHtmlPost = (text, url, filename) => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      const title =
        doc.querySelector('h1.article-title')?.textContent?.trim() ||
        doc.querySelector('h1')?.textContent?.trim() ||
        doc.querySelector('title')?.textContent?.replace(/\s*\|.*$/, '').trim() ||
        filename;

      const headerText = doc.querySelector('.article-header p')?.textContent || '';
      const date = (headerText.match(/[0-9]{4}-[0-9]{2}-[0-9]{2}/) || [])[0] || '';
      const segments = headerText.split('•').map(s => s.trim()).filter(Boolean);
      const category = normalizeCategory(segments[2] || segments[1] || '未分類');

      const firstParagraph =
        doc.querySelector('.article-content p')?.textContent?.trim() ||
        doc.querySelector('.article-content')?.textContent?.replace(/\s+/g, ' ').trim() ||
        '';

      return {
        title,
        date,
        category,
        excerpt: firstParagraph.slice(0, 140) + (firstParagraph.length > 140 ? '…' : ''),
        url
      };
    };

    const fetchPost = async (filename) => {
      const baseDirs = ['posts', 'post', '/posts', '/post'];
      for (const base of baseDirs) {
        const url = `${base}/${filename}`;
        try {
          const response = await fetch(url);
          if (!response.ok) continue;
          const text = await response.text();
          return filename.endsWith('.md')
            ? parseMarkdownPost(text, url, filename)
            : parseHtmlPost(text, url, filename);
        } catch (_) {
          // ignore and try next base
        }
      }
      return null;
    };

    const renderPosts = (posts) => {
      if (!posts.length) {
        postListEl.innerHTML = '<div class="empty-state">目前無法讀取文章，請確認網站可存取 <code>/posts</code> 或 <code>/post</code> 目錄。</div>';
        return;
      }

      postListEl.innerHTML = posts.map((post) => `
        <article class="article-card">
          <div class="article-meta">
            <span class="meta-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</span>
            <span class="meta-category"><i class="fas fa-tag"></i> ${post.category}</span>
          </div>
          <h2 class="article-title"><a href="${post.url}">${post.title}</a></h2>
          <p class="article-excerpt">${post.excerpt || '點擊閱讀全文。'}</p>
          <a class="read-more" href="${post.url}">閱讀全文 <i class="fas fa-arrow-right"></i></a>
        </article>
      `).join('');
    };

    const renderStats = (posts) => {
      const total = posts.length;
      const newest = posts[0]?.date ? formatDate(posts[0].date) : '未知';
      const oldest = posts[posts.length - 1]?.date ? formatDate(posts[posts.length - 1].date) : '未知';

      globalStatsEl.innerHTML = `
        <li><span>文章總數</span><strong>${total}</strong></li>
        <li><span>最新文章日期</span><strong>${newest}</strong></li>
        <li><span>最早文章日期</span><strong>${oldest}</strong></li>
      `;

      const categoryCount = posts.reduce((acc, post) => {
        const key = post.category || '未分類';
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});

      const sorted = Object.entries(categoryCount).sort((a, b) => b[1] - a[1]);
      topicListEl.innerHTML = sorted.map(([cat, count]) => `
        <li><span>${cat}</span><span class="count">${count}</span></li>
      `).join('');
    };

    const main = async () => {
      const results = await Promise.all(KNOWN_POST_FILES.map(fetchPost));
      const posts = results.filter(Boolean);
      posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      renderPosts(posts);
      renderStats(posts);
    };

    main();
  </script>
</body>
</html>
